# Codecov config — tunes the badge + PR checks to match dddns's
# coverage plan (ai_docs/20260418T2259Z_test-coverage-plan.md).
#
# We deliberately exclude code the plan classifies as Tier 3 (testing
# it would be test-ware, not defect-catching). The remaining surface
# is what the badge grades.

codecov:
  # Prevents Codecov from commenting on PRs when CI itself has failed.
  # Cuts noise in the common "broken PR" case.
  require_ci_to_pass: true

coverage:
  # Badge is rendered as a continuous red→green gradient across the
  # `range`. Keep 66.4% (current baseline) near the *middle* of the
  # range so the badge shows yellow, not red.
  #
  # Position of N within [lo, hi] = (N - lo) / (hi - lo).
  #   range "50...80": 66.4% -> position 0.55 -> yellow
  # Below 50% = red (genuinely low), 80%+ = green (target).
  range: "50...80"
  precision: 1
  round: down

  status:
    # Both checks are *informational*: they compute and report coverage
    # deltas on PRs so reviewers can see the impact, but they do NOT
    # block the merge button. Rationale: coverage thresholds don't
    # distinguish "genuine test gap" from "refactor that deleted
    # tested dead code" or "1-line error-path fix that can't be
    # meaningfully tested". GitHub branch protection + human review
    # are the actual gate; Codecov is a signal.
    project:
      default:
        target: auto
        threshold: 1%
        informational: true
        if_ci_failed: error

    patch:
      default:
        target: auto
        informational: true
        if_ci_failed: error

# Exclude files the coverage plan marks as intentionally untested.
# These are genuine entry points or build-time constants; testing
# them would test the compiler/runtime, not our code.
ignore:
  - "main.go"                           # cobra Execute + os.Exit wrapper
  - "internal/version/**"               # string concatenation on build-time vars
  - "deploy/aws-lambda/main.go"         # Lambda bootstrap; runs in AWS, not in tests

# Comment less — PR noise. Only post once per PR, and only when
# coverage materially changes.
comment:
  layout: "reach,diff,flags,tree"
  behavior: default
  require_changes: true
  require_base: false
  require_head: true

# GitHub checks: keep them soft so a drop in coverage doesn't block
# a merge the reviewer has already approved. CI still gates real
# failures (test runs, lint).
github_checks:
  annotations: true
